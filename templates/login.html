{% extends 'base.html' %}

{% block title %}Sign In{% endblock %}

{% block content %}
<div class="col-12 d-flex justify-content-center align-items-center py-4">
  <div class="card shadow border p-4" style="width: 100%; max-width: 420px;">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill text-warning display-4"></i>
      <h3 class="fw-bold mt-2">Account Login</h3>
      <p class="text-muted small">Enter your credentials to access the platform</p>
    </div>
    
    <form action="{{ url_for('auth.login') }}" method="POST">
      <div class="mb-3">
        <label for="txt_email" class="form-label small fw-bold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" name="txt_email" id="txt_email" placeholder="name@example.com" required>
        </div>
      </div>
      
      <div class="mb-4">
        <label for="txt_password" class="form-label small fw-bold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-key"></i></span>
          <input type="password" class="form-control" name="txt_password" id="txt_password" placeholder="••••••••" required>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Sign In</button>
    </form>
  </div>
</div>
{% endblock %}
