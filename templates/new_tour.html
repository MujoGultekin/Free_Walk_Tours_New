{% extends 'base.html' %}

{% block title %}Create New Tour{% endblock %}

{% block content %}
<div class="col-12 d-flex justify-content-center py-4">
    <div class="card shadow border p-4" style="width: 100%; max-width: 600px;">
        <h2 class="mb-4 fw-bold text-primary">Create a New Walking Tour</h2>
        
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="title" class="form-label small fw-bold">Title</label>
                <input type="text" class="form-control" name="title" id="title" required>
            </div>
            <div class="mb-3">
                <label for="meeting_point" class="form-label small fw-bold">Meeting Point</label>
                <input type="text" class="form-control" name="meeting_point" id="meeting_point" required>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-md-6">
                    <label for="duration" class="form-label small fw-bold">Duration (minutes)</label>
                    <input type="number" class="form-control" name="duration" id="duration" required>
                </div>
                <div class="col-md-6">
                    <label for="language" class="form-label small fw-bold">Language</label>
                    <input type="text" class="form-control" name="language" id="language" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="max_participants" class="form-label small fw-bold">Max Participants</label>
                <input type="number" class="form-control" name="max_participants" id="max_participants" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label small fw-bold">Description</label>
                <textarea class="form-control" name="description" id="description" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label for="stops" class="form-label small fw-bold">Stops (comma separated)</label>
                <input type="text" class="form-control" name="stops" id="stops" placeholder="e.g. Colosseum, Forum" required>
            </div>
            <div class="mb-4">
                <label for="photos" class="form-label small fw-bold">Upload Tour Photos (Select up to 5)</label>
                <input type="file" class="form-control" name="photos" id="photos" accept="image/*" multiple required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Create Tour</button>
        </form>
    </div>
</div>
{% endblock %}
