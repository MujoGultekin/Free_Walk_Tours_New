<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Tour</title>
    <!-- CSS dosya yolunu style.css konumuna göre düzelttim -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .form-container { max-width: 600px; margin: 40px auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container form-container">
    <!-- Sayfanın genel tasarımına uyması için card sınıfını kullandık -->
    <div class="card shadow p-4">
        <h2 class="mb-4">Create a New Walking Tour</h2>
        <!-- Dosya yükleme özelliği için enctype ekledik -->
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" required>
            </div>
            <div class="form-group">
                <label>Meeting Point</label>
                <input type="text" name="meeting_point" required>
            </div>
            <div class="form-group">
                <label>Duration (minutes)</label>
                <input type="number" name="duration" required>
            </div>
            <div class="form-group">
                <label>Language</label>
                <input type="text" name="language" required>
            </div>
            <div class="form-group">
                <label>Max Participants</label>
                <input type="number" name="max_participants" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label>Stops (comma separated)</label>
                <input type="text" name="stops" placeholder="e.g. Colosseum, Forum" required>
            </div>
            <div class="form-group">
                <label>Upload Tour Photos (Select up to 5)</label>
                <!-- Dosya yükleme alanı (multiple ile çoklu seçim aktif) -->
                <input type="file" name="photos" accept="image/*" multiple required>
            </div>
            <button type="submit">Create Tour</button>
        </form>
    </div>
</div>

</body>
</html>
