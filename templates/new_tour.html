<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Tour</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .form-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container form-container">
    <h2 class="mb-4 text-center">Create a New Walking Tour</h2>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Meeting Point</label>
                <input type="text" name="meeting_point" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Duration (minutes)</label>
                <input type="number" name="duration" class="form-control" required>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Language</label>
                <input type="text" name="language" class="form-control" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Max Participants</label>
                <input type="number" name="max_participants" class="form-control" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Stops (comma separated)</label>
            <input type="text" name="stops" class="form-control" placeholder="Colosseum, Forum, Palatine" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Photo filename</label>
            <input type="text" name="photos" class="form-control" placeholder="e.g., tour.jpg">
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Tour</button>
    </form>
</div>

</body>
</html>
